events {
  worker_connections 1024;
}

http {
  map $http_x_real_ip $proxy_real_ip {
    default $http_x_real_ip;
    "" $remote_addr;
  }

  map $http_x_forwarded_for $proxy_forwarded_for {
    default $http_x_forwarded_for;
    "" $remote_addr;
  }

  map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  map $http_x_forwarded_host $proxy_forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
  }

  map $http_x_forwarded_port $proxy_forwarded_port {
    default $http_x_forwarded_port;
    "" $server_port;
  }

  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:8000;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $proxy_real_ip;
      proxy_set_header X-Forwarded-For $proxy_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
      proxy_set_header X-Forwarded-Port $proxy_forwarded_port;
      proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $proxy_real_ip;
      proxy_set_header X-Forwarded-For $proxy_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      proxy_set_header X-Forwarded-Host $proxy_forwarded_host;
      proxy_set_header X-Forwarded-Port $proxy_forwarded_port;

      # SSE 支持
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
    }
  }

  # 生产环境如需 HTTPS，请在 ./docker/nginx/ssl 放置证书并启用以下 server 块
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
