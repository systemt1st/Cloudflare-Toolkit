services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=cf_toolkit_dev
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev123

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

  bepusdt:
    image: v03413/bepusdt:latest
    container_name: bepusdt
    restart: unless-stopped
    profiles: ["payments"]
    ports:
      - "8080:8080"
    volumes:
      - ./docker/bepusdt/conf.toml:/usr/local/bepusdt/conf.toml
      - ./docker/bepusdt/data:/var/lib/bepusdt

volumes:
  postgres_dev_data:
  redis_dev_data:
